<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent; font-family: 'Poppins', sans-serif; }
    body { padding: 6px; }

    a.widget {
      display: block;
      width: 100%; max-width: 320px; margin: 0 auto;
      background: #fff; border: 1px solid #c2d9f0;
      border-radius: 12px; padding: 16px 18px;
      box-shadow: 0 4px 16px rgba(74,144,217,0.12);
      text-decoration: none; cursor: pointer;
      transition: box-shadow .15s, transform .15s;
    }
    a.widget:hover {
      box-shadow: 0 6px 22px rgba(74,144,217,0.22);
      transform: translateY(-2px);
    }

    .biz-name {
      font-size: 14px; font-weight: 700; color: #4a90d9; margin-bottom: 8px;
    }
    .rating-row {
      display: flex; align-items: center; gap: 12px;
    }
    .avg {
      font-size: 40px; font-weight: 700; color: #4a90d9; line-height: 1;
    }
    .rating-detail { display: flex; flex-direction: column; gap: 3px; }
    .stars-row { display: flex; gap: 2px; }
    .star { font-size: 18px; line-height: 1; }
    .star.on  { color: #f57c00; }
    .star.off { color: #ddd; }
    .rev-count {
      font-size: 12px; color: #4a90d9; font-weight: 500;
    }
  </style>
</head>
<body>

<a class="widget"
   href="https://secureform.dentalcenterpediatrics.com/DCP-profile.html"
   target="_blank" rel="noopener noreferrer">
  <div class="biz-name">Dental Center Pediatrics</div>
  <div class="rating-row">
    <span class="avg" id="avg">—</span>
    <div class="rating-detail">
      <div class="stars-row" id="stars-row"></div>
      <span class="rev-count" id="rev-count">Loading…</span>
    </div>
  </div>
</a>

<script>
  function renderStars(avg) {
    var row = document.getElementById('stars-row');
    row.innerHTML = '';
    for (var i = 1; i <= 5; i++) {
      var s = document.createElement('span');
      s.className = 'star ' + (i <= Math.round(avg) ? 'on' : 'off');
      s.textContent = '★';
      row.appendChild(s);
    }
  }

  renderStars(4.8);

  fetch('reviews.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var avg   = parseFloat(data.business.avgRating);
      var count = parseInt(data.business.reviewCount, 10);
      document.getElementById('avg').textContent      = avg.toFixed(1);
      document.getElementById('rev-count').textContent = count.toLocaleString() + ' Reviews';
      renderStars(avg);
    })
    .catch(function() {
      document.getElementById('avg').textContent      = '4.8';
      document.getElementById('rev-count').textContent = 'See Reviews';
    });
</script>
</body>
</html>
