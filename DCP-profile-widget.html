<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent; font-family: 'Roboto', Arial, sans-serif; }
    body { padding: 6px; }

    .card {
      width: 100%; max-width: 560px; margin: 0 auto;
      background: #f4f8ff; border: 1px solid #d9e4f5;
      border-radius: 16px; color: #1a1a1a;
      box-shadow: 0 6px 20px rgba(42,122,181,0.08); overflow: hidden;
    }

    /* ── Header banner ─────────────────────────────────── */
    .banner {
      background: linear-gradient(135deg, #1a5a8a 0%, #2a7ab5 100%);
      padding: 18px 18px 16px; text-align: center;
    }
    .banner-eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 4px;
    }
    .rating-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 6px;
    }
    .rating-num {
      font-size: 44px; font-weight: 800; color: #fff; line-height: 1;
    }
    .rating-right { text-align: left; }
    .stars { font-size: 20px; color: #FFD43B; letter-spacing: 2px; line-height: 1; }
    .review-count {
      font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 600; margin-top: 2px;
    }
    .view-btn {
      display: inline-block; margin-top: 12px;
      background: #fff; color: #1a5a8a;
      font-size: 12px; font-weight: 800; letter-spacing: 1.2px;
      text-transform: uppercase; text-decoration: none;
      padding: 9px 24px; border-radius: 999px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.18);
      transition: background .15s, transform .15s;
    }
    .view-btn:hover { background: #e8f2fb; transform: translateY(-1px); }

    /* ── Body ──────────────────────────────────────────── */
    .body { padding: 14px 16px; }

    /* Rating bars */
    .bars-title {
      font-size: 10px; font-weight: 800; letter-spacing: 1.6px;
      text-transform: uppercase; color: #6a7b91; margin-bottom: 8px;
    }
    .bar-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 5px; font-size: 11px; font-weight: 700; color: #1f2f44;
    }
    .bar-label { width: 14px; text-align: right; flex-shrink: 0; }
    .bar-star { color: #b07800; flex-shrink: 0; }
    .bar-track {
      flex: 1; height: 7px; background: #dbe5f2; border-radius: 999px; overflow: hidden;
    }
    .bar-fill { height: 100%; background: #2a7ab5; border-radius: 999px; }
    .bar-pct { width: 30px; text-align: right; color: #5a6d84; flex-shrink: 0; }

    .divider { border: none; border-top: 1px solid #dbe5f2; margin: 12px 0; }

    /* Source pills */
    .sources-title {
      font-size: 10px; font-weight: 800; letter-spacing: 1.6px;
      text-transform: uppercase; color: #6a7b91; margin-bottom: 8px;
    }
    .sources { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      font-size: 11px; font-weight: 700; color: #1a3d5c;
      background: #eaf2fb; border: 1px solid #c4d9f0;
      border-radius: 999px; padding: 4px 10px;
    }

    .divider2 { border: none; border-top: 1px solid #dbe5f2; margin: 12px 0; }

    /* Recent reviews */
    .reviews-title {
      font-size: 10px; font-weight: 800; letter-spacing: 1.6px;
      text-transform: uppercase; color: #6a7b91; margin-bottom: 8px;
    }
    .review-card {
      background: #fff; border: 1px solid #dbe5f2; border-radius: 10px;
      padding: 10px 12px; margin-bottom: 8px;
    }
    .review-card:last-child { margin-bottom: 0; }
    .rev-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .rev-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      background: #2a7ab5; color: #fff; font-size: 13px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .rev-meta { flex: 1; min-width: 0; }
    .rev-name { font-size: 12px; font-weight: 700; color: #183b6b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rev-stars { font-size: 12px; color: #FFD43B; }
    .rev-source { font-size: 10px; color: #8a9ab0; font-weight: 600; }
    .rev-text {
      font-size: 11px; color: #3a4d62; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* ── Footer strip ──────────────────────────────────── */
    .footer-strip {
      padding: 12px 16px; background: #f0f4fa;
      border-top: 1.5px solid #d9e4f5; text-align: center;
    }
    .footer-cta {
      display: inline-block;
      background: linear-gradient(135deg, #1a5a8a 0%, #2a7ab5 100%);
      color: #fff; font-size: 12px; font-weight: 800; letter-spacing: 1.2px;
      text-transform: uppercase; text-decoration: none;
      padding: 10px 28px; border-radius: 999px;
      box-shadow: 0 3px 10px rgba(26,90,138,0.3);
      transition: opacity .15s, transform .15s;
    }
    .footer-cta:hover { opacity: .9; transform: translateY(-1px); }

    @media (min-width: 480px) {
      .rating-num { font-size: 52px; }
      .stars { font-size: 22px; }
      .review-count { font-size: 13px; }
      .body { padding: 16px 18px; }
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Banner -->
  <div class="banner">
    <div class="banner-eyebrow">Patient Reviews</div>
    <div class="rating-row">
      <span class="rating-num" id="rating-num">—</span>
      <div class="rating-right">
        <div class="stars" id="banner-stars">★★★★★</div>
        <div class="review-count" id="review-count">Loading…</div>
      </div>
    </div>
    <a class="view-btn"
       href="https://secureform.dentalcenterpediatrics.com/DCP-profile.html"
       target="_blank" rel="noopener">View Full Profile</a>
  </div>

  <!-- Body -->
  <div class="body">

    <div class="bars-title">Rating Breakdown</div>
    <div id="bars-container"></div>

    <hr class="divider" />

    <div class="sources-title">Review Sources</div>
    <div class="sources" id="sources-container"></div>

    <hr class="divider2" />

    <div class="reviews-title">Recent Reviews</div>
    <div id="reviews-container">
      <div style="font-size:12px;color:#8a9ab0;font-style:italic">Loading reviews…</div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer-strip">
    <a class="footer-cta"
       href="https://secureform.dentalcenterpediatrics.com/DCP-profile.html"
       target="_blank" rel="noopener">Read All Reviews</a>
  </div>

</div>

<script>
  function stars(n) {
    var full = Math.round(n);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  fetch('reviews.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var avg   = parseFloat(data.business.avgRating);
      var count = parseInt(data.business.reviewCount, 10);

      // Banner
      document.getElementById('rating-num').textContent  = avg.toFixed(1);
      document.getElementById('banner-stars').textContent = stars(avg);
      document.getElementById('review-count').textContent =
        count.toLocaleString() + ' Reviews';

      // Rating bars (use displayCount-based ratings)
      var ratings = (data.summary && data.summary.ratings) || [];
      var total = ratings.reduce(function(s, r) { return s + r.count; }, 0) || 1;
      var bars = document.getElementById('bars-container');
      bars.innerHTML = '';
      for (var i = 5; i >= 1; i--) {
        var entry = ratings.find(function(r) { return r.rating === i; });
        var cnt   = entry ? entry.count : 0;
        var pct   = total > 0 ? Math.round(cnt / total * 100) : 0;
        bars.innerHTML +=
          '<div class="bar-row">' +
            '<span class="bar-label">' + i + '</span>' +
            '<span class="bar-star">★</span>' +
            '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
            '<span class="bar-pct">' + pct + '%</span>' +
          '</div>';
      }

      // Sources
      var sources = (data.summary && data.summary.sources) || [];
      var sc = document.getElementById('sources-container');
      sc.innerHTML = '';
      sources.forEach(function(s) {
        sc.innerHTML += '<span class="pill">' + esc(s.name) + ' (' + s.count + ')</span>';
      });

      // Recent reviews — up to 3 most recent published with a comment
      var reviews = (data.reviews || [])
        .filter(function(r) { return r.status === 'Published' && r.comment && r.rating >= 4; })
        .slice(0, 3);
      var rc = document.getElementById('reviews-container');
      if (!reviews.length) { rc.innerHTML = ''; return; }
      rc.innerHTML = reviews.map(function(r) {
        var name   = esc((r.reviewer && r.reviewer.name) || 'Patient');
        var initial = name.charAt(0).toUpperCase();
        var src    = esc(r.sourceName || '');
        var text   = esc(r.comment || '');
        var strs   = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
        return '<div class="review-card">' +
          '<div class="rev-header">' +
            '<div class="rev-avatar">' + initial + '</div>' +
            '<div class="rev-meta">' +
              '<div class="rev-name">' + name + '</div>' +
              '<span class="rev-stars">' + strs + '</span>' +
              (src ? ' <span class="rev-source">· ' + src + '</span>' : '') +
            '</div>' +
          '</div>' +
          '<div class="rev-text">' + text + '</div>' +
        '</div>';
      }).join('');
    })
    .catch(function() {
      document.getElementById('rating-num').textContent   = '4.9';
      document.getElementById('review-count').textContent = 'View Reviews';
    });
</script>
</body>
</html>
