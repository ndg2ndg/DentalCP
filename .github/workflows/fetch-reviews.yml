name: Fetch Birdeye Reviews

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch reviews from Birdeye API
        env:
          BIRDEYE_API_KEY: ${{ secrets.BIRDEYE_API_KEY }}
          BIRDEYE_BID: ${{ secrets.BIRDEYE_BID }}
        run: node fetch-reviews-to-json.js

      - name: Commit and push reviews
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add reviews.json
          git diff --staged --quiet || git commit -m "Update reviews data"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done