<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — Dental Center Pediatrics</title>
  <!--
    EMBED ON YOUR WEBSITE (add just before </body>):
    <script>
      (function(){
        var f = document.createElement('iframe');
        f.src = 'https://ndg2ndg.github.io/DentalCP/webchat_widget.html';
        f.style.cssText = 'position:fixed;bottom:0;right:0;width:400px;height:620px;border:none;z-index:9999;background:transparent;';
        f.allow = 'microphone';
        document.body.appendChild(f);
      })();
    </script>
  -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root{
      --blue:#4a90d9;--blue-dk:#3a7bc8;--blue-lt:#eaf3fb;
      --navy:#1a2e44;--green:#22c55e;--amber:#f59e0b;
      --slate:#64748b;--slate-lt:#f1f5f9;--slate-bd:#e2e8f0;
      --white:#fff;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:transparent;overflow:hidden;}

    /* ── Bubble ───────────────────────────────────────────── */
    #bubble{
      position:fixed;bottom:18px;right:18px;
      width:58px;height:58px;border-radius:50%;
      background:var(--navy);border:3px solid var(--slate);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 22px rgba(26,46,68,.45);
      transition:transform .2s,border-color .4s;
      z-index:999;
    }
    #bubble:hover{transform:scale(1.07);}
    #bubble svg{transition:opacity .2s,transform .2s;position:absolute;fill:#fff;}
    #bubble .ico-chat{opacity:1;}
    #bubble .ico-close{opacity:0;transform:rotate(-45deg);}
    #bubble.open .ico-chat{opacity:0;transform:rotate(45deg);}
    #bubble.open .ico-close{opacity:1;transform:rotate(0);}
    #bubble-badge{
      position:absolute;top:-4px;right:-4px;
      width:20px;height:20px;border-radius:50%;
      background:#ef4444;border:2.5px solid #fff;
      display:none;align-items:center;justify-content:center;
      font-size:10px;font-weight:700;color:#fff;
      animation:badgepop .3s ease-out;
    }
    @keyframes badgepop{from{transform:scale(0)}to{transform:scale(1)}}

    /* ── Panel ────────────────────────────────────────────── */
    #panel{
      position:fixed;bottom:88px;right:18px;
      width:350px;height:520px;
      background:var(--white);border-radius:18px;
      box-shadow:0 8px 48px rgba(0,0,0,.18);
      display:flex;flex-direction:column;overflow:hidden;
      transform:scale(.9) translateY(16px);transform-origin:bottom right;
      opacity:0;pointer-events:none;
      transition:opacity .22s cubic-bezier(.4,0,.2,1),transform .22s cubic-bezier(.4,0,.2,1);
      z-index:998;
    }
    #panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}

    /* ── Header ───────────────────────────────────────────── */
    .hdr{
      background:var(--navy);padding:14px 16px 12px;
      flex-shrink:0;display:flex;align-items:center;gap:10px;
    }
    .hdr-dot{
      width:9px;height:9px;border-radius:50%;
      background:var(--slate);flex-shrink:0;transition:background .4s;
    }
    @keyframes livepulse{
      0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.7);}
      60%{box-shadow:0 0 0 6px rgba(34,197,94,0);}
    }
    .hdr-dot.live{
      background:var(--green) !important;
      animation:livepulse 1.6s ease-in-out infinite;
    }
    .hdr-text{flex:1;}
    .hdr-name{font-size:14px;font-weight:700;color:#fff;}
    .hdr-sub{font-size:11px;color:rgba(255,255,255,.8);margin-top:2px;}
    .hdr-close{
      background:none;border:none;color:rgba(255,255,255,.7);
      font-size:22px;cursor:pointer;line-height:1;
      padding:0 0 0 8px;flex-shrink:0;
    }
    .hdr-close:hover{color:#fff;}

    /* ── Messages ─────────────────────────────────────────── */
    #msgs{
      flex:1;overflow-y:auto;
      padding:14px 14px 8px;
      display:flex;flex-direction:column;gap:10px;
      scroll-behavior:smooth;
    }
    #msgs::-webkit-scrollbar{width:4px;}
    #msgs::-webkit-scrollbar-thumb{background:var(--slate-bd);border-radius:4px;}
    .msg-row{display:flex;gap:8px;max-width:85%;animation:msgin .18s ease-out;}
    @keyframes msgin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .msg-row.bot{align-self:flex-start;}
    .msg-row.user{align-self:flex-end;flex-direction:row-reverse;}
    .msg-av{
      width:28px;height:28px;border-radius:50%;flex-shrink:0;
      background:var(--blue-lt);display:flex;align-items:center;
      justify-content:center;font-size:13px;margin-top:2px;
    }
    .msg-row.user .msg-av{background:var(--slate-lt);}
    .msg-row.agent .msg-av{background:#e8f0fe;}
    .bubble-wrap{display:flex;flex-direction:column;gap:2px;}
    .bbl{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.52;word-break:break-word;}
    .bot .bbl{background:var(--slate-lt);color:var(--navy);border-radius:14px 14px 14px 3px;}
    .user .bbl{background:var(--blue);color:#fff;border-radius:14px 14px 3px 14px;}
    .agent .bbl{background:#e8f0fe;color:var(--navy);border-radius:14px 14px 14px 3px;}
    .agent-name{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;padding:0 4px;}
    .msg-time{font-size:10px;color:#94a3b8;padding:0 4px;}
    .user .msg-time{text-align:right;}

    /* Typing indicator */
    .typing-row{display:flex;gap:8px;align-self:flex-start;animation:msgin .18s ease-out;}
    .typing-bbl{
      background:var(--slate-lt);border-radius:14px 14px 14px 3px;
      padding:11px 16px;display:flex;gap:5px;align-items:center;
    }
    .typing-bbl span{
      width:7px;height:7px;border-radius:50%;background:#94a3b8;
      animation:bounce 1.2s infinite;
    }
    .typing-bbl span:nth-child(2){animation-delay:.2s;}
    .typing-bbl span:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
    .agent-typing-label{
      font-size:11px;color:var(--slate);font-style:italic;padding:0 4px 2px;
    }

    /* Handoff banner */
    .handoff-banner{
      background:#d1fae5;border:1px solid #6ee7b7;border-radius:10px;
      padding:10px 13px;font-size:12px;color:#065f46;line-height:1.5;
      display:flex;gap:9px;align-items:flex-start;animation:msgin .2s ease-out;
    }
    .hb-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
    .sys-note{text-align:center;font-size:11px;color:#94a3b8;padding:2px 0;font-style:italic;}

    /* ── Input bar ────────────────────────────────────────── */
    .input-bar{
      border-top:1px solid var(--slate-bd);padding:10px 12px;
      display:flex;gap:8px;align-items:flex-end;
      flex-shrink:0;background:var(--white);
    }
    #user-input{
      flex:1;border:1.5px solid var(--slate-bd);border-radius:20px;
      padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;
      color:var(--navy);outline:none;resize:none;max-height:100px;
      line-height:1.45;transition:border-color .15s;background:var(--white);
    }
    #user-input:focus{border-color:var(--blue);}
    #user-input::placeholder{color:#94a3b8;}
    #user-input:disabled{background:var(--slate-lt);color:var(--slate);}
    #send-btn{
      width:38px;height:38px;border-radius:50%;flex-shrink:0;
      background:var(--blue);border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s,transform .1s;
    }
    #send-btn:hover:not(:disabled){background:var(--blue-dk);}
    #send-btn:active:not(:disabled){transform:scale(.92);}
    #send-btn:disabled{opacity:.45;cursor:not-allowed;}
    .privacy{font-size:10px;color:#94a3b8;text-align:center;padding:5px 14px 10px;flex-shrink:0;line-height:1.4;}

    @media(max-width:400px){
      #panel{width:calc(100vw - 24px);right:12px;height:90vh;bottom:80px;}
    }
  </style>
</head>
<body>

<!-- ── Bubble button ───────────────────────────────────── -->
<button id="bubble" aria-label="Chat with us">
  <span id="bubble-badge"></span>
  <svg class="ico-chat" width="26" height="26" viewBox="0 0 24 24">
    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
  </svg>
  <svg class="ico-close" width="22" height="22" fill="none" viewBox="0 0 24 24">
    <path d="M18 6 6 18M6 6l12 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
</button>

<!-- ── Chat panel ─────────────────────────────────────── -->
<div id="panel" role="dialog" aria-label="Chat with Dental Center Pediatrics">

  <!-- Header -->
  <div class="hdr">
    <span class="hdr-dot" id="hdr-dot"></span>
    <div class="hdr-text">
      <div class="hdr-name" id="hdr-name">Chat with Our Team</div>
      <div class="hdr-sub" id="hdr-status">Checking availability&hellip;</div>
    </div>
    <button class="hdr-close" onclick="closePanel()" title="Close chat">&times;</button>
  </div>

  <div id="msgs"></div>

  <div class="input-bar">
    <textarea id="user-input" rows="1" placeholder="Type your message&hellip;"
              oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
        <path d="M22 2 11 13M22 2 15 22 11 13 2 9l20-7z"
              stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="privacy">&#x1F512; Your privacy is protected. No sensitive health data is stored in this chat.</div>
</div>

<script>
// ── Server URL ──────────────────────────────────────────────
var INBOX_URL = 'https://dcp-inbox.consulting4real.com';

var STATUS_COLORS = { open: '#22c55e', open_busy: '#f59e0b', closed: '#64748b' };

var bubble   = document.getElementById('bubble');
var panel    = document.getElementById('panel');
var msgs     = document.getElementById('msgs');
var inp      = document.getElementById('user-input');
var sendBtn  = document.getElementById('send-btn');
var badge    = document.getElementById('bubble-badge');
var hdrDot   = document.getElementById('hdr-dot');
var hdrStat  = document.getElementById('hdr-status');
var hdrName  = document.getElementById('hdr-name');

// ── Session: persist across page refreshes ──────────────────
var SESSION_ID = sessionStorage.getItem('wc_session_id') ||
  ('wc-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7));
sessionStorage.setItem('wc_session_id', SESSION_ID);

// ── State ───────────────────────────────────────────────────
var history       = [];
var handedOff     = false;  // appointment-style handoff (chat ended)
var liveMode      = false;  // real-time agent session
var opened        = false;
var officeOpen    = false;
var pollTimer     = null;
var pollSince     = 0;
var pollTimeoutTimer = null;
var agentTypingEl = null;

var HANDOFF_PHRASES = [
  'human', 'agent', 'real person',
  'talk to someone', 'speak to someone', 'representative'
];

// ── Restore live session after page refresh ─────────────────
if (sessionStorage.getItem('wc_live_mode') === '1') {
  setTimeout(restoreLiveSession, 400);
}

async function restoreLiveSession() {
  try {
    var res  = await fetch(INBOX_URL + '/webchat/live-poll?session_id='
      + encodeURIComponent(SESSION_ID) + '&since=0');
    var data = await res.json();
    if (data.status === 'live') {
      activateLiveModeUI();
      // Show any staff/system messages from this session
      (data.messages || []).forEach(function(m) {
        if (m.from === 'staff')  appendAgent(m.text, m.sender);
        if (m.from === 'system') { appendSysNote(m.text); }
      });
      pollSince = data.total;
      startPollLoop();
    } else {
      sessionStorage.removeItem('wc_live_mode');
    }
  } catch(e) {}
}

// ── Office status ───────────────────────────────────────────
function fetchStatus() {
  fetch(INBOX_URL + '/api/office-status')
    .then(function(r) { return r.json(); })
    .then(function(s) {
      officeOpen = (s.status === 'open' || s.status === 'open_busy');
      if (!liveMode) {
        var color = STATUS_COLORS[s.status] || '#64748b';
        hdrDot.style.background  = color;
        bubble.style.borderColor = color;
        if (hdrStat) hdrStat.textContent = s.statusText || '';
      }
    })
    .catch(function() {});
}

fetchStatus();
setInterval(fetchStatus, 60000);

// ── Bubble toggle ───────────────────────────────────────────
bubble.addEventListener('click', function() {
  var isOpen = panel.classList.toggle('open');
  bubble.classList.toggle('open', isOpen);
  badge.style.display = 'none';
  if (isOpen && !opened) { opened = true; sendGreeting(); }
});

function closePanel() {
  panel.classList.remove('open');
  bubble.classList.remove('open');
}

function sendGreeting() {
  appendBot('Hi there! 👋 I\'m the virtual assistant for Dental Center Pediatrics. I can answer questions about our services, hours, and insurance — or help you request an appointment. What can I help you with today?');
}

setTimeout(function() {
  if (!opened) { badge.textContent = '1'; badge.style.display = 'flex'; }
}, 4000);

// ── Send message ────────────────────────────────────────────
async function sendMessage() {
  var text = inp.value.trim();
  if (!text) return;
  appendUser(text);
  inp.value = ''; inp.style.height = '';

  // Live mode: route to patient-message endpoint
  if (liveMode) {
    try {
      await fetch(INBOX_URL + '/webchat/patient-message', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ session_id: SESSION_ID, text: text })
      });
    } catch(e) {
      console.error('[webchat] Patient message error:', e);
    }
    return;
  }

  if (handedOff) return;

  history.push({ role: 'user', content: text });
  setLoading(true);
  var typingEl = showTyping();

  try {
    var res = await fetch(INBOX_URL + '/webchat/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ messages: history, session_id: SESSION_ID })
    });
    if (!res.ok) {
      var errBody = await res.text();
      throw new Error('HTTP ' + res.status + ' ' + res.statusText + ': ' + errBody);
    }
    var data = await res.json();
    typingEl.remove(); setLoading(false);
    appendBot(data.reply);
    history.push({ role: 'assistant', content: data.reply });

    if (data.live) {
      activateLiveMode();
    } else if (data.handoff) {
      triggerHandoff();
    }
  } catch(e) {
    console.error('[webchat] AI call failed:', e);
    typingEl.remove(); setLoading(false);
    appendBot("I'm having trouble connecting right now. Please call us at (508) 830-1212 and we'll be happy to help!");
  }
}

// ── Live mode ───────────────────────────────────────────────
function activateLiveMode() {
  activateLiveModeUI();
  sessionStorage.setItem('wc_live_mode', '1');
  pollSince = 0;
  startPollLoop();
}

function activateLiveModeUI() {
  liveMode = true;
  hdrDot.classList.add('live');
  hdrName.textContent = 'Connected to team';
  if (hdrStat) hdrStat.textContent = 'Live support';
  inp.disabled    = false;
  sendBtn.disabled = false;
  inp.placeholder = 'Type your message…';
}

function startPollLoop() {
  if (pollTimer) return;
  pollTimer = setInterval(pollForMessages, 3000);

  // Widget-side 3-minute fallback (backup if backend doesn't send system msg)
  pollTimeoutTimer = setTimeout(function() {
    if (!liveMode) return;
    appendSysNote('Our team is currently busy. We will follow up shortly. You can also call us at (508) 830-1212.');
    endLiveSession();
  }, 180000);
}

async function pollForMessages() {
  try {
    var res  = await fetch(INBOX_URL + '/webchat/live-poll?session_id='
      + encodeURIComponent(SESSION_ID) + '&since=' + pollSince);
    var data = await res.json();

    // Agent typing indicator
    if (data.agent_typing) showAgentTyping();
    else hideAgentTyping();

    // New messages
    if (data.messages && data.messages.length) {
      data.messages.forEach(function(m) {
        if (m.from === 'staff') {
          appendAgent(m.text, m.sender);
        } else if (m.from === 'system') {
          clearTimeout(pollTimeoutTimer);
          appendSysNote(m.text);
          endLiveSession();
        }
      });
      pollSince = data.total;
    }

    // Conversation closed by staff
    if (data.status === 'ended' || data.status === 'not_found') {
      clearTimeout(pollTimeoutTimer);
      appendSysNote('The chat session has ended. Thank you!');
      endLiveSession();
    }
  } catch(e) {
    console.error('[webchat] Poll error:', e);
  }
}

function endLiveSession() {
  clearInterval(pollTimer);
  clearTimeout(pollTimeoutTimer);
  pollTimer        = null;
  pollTimeoutTimer = null;
  liveMode         = false;
  sessionStorage.removeItem('wc_live_mode');
  hideAgentTyping();
  hdrDot.classList.remove('live');
  hdrName.textContent = 'Chat with Our Team';
  fetchStatus();  // restore office status dot + subtitle
}

// ── Agent typing indicator ───────────────────────────────────
function showAgentTyping() {
  if (agentTypingEl) return;
  agentTypingEl = document.createElement('div');
  agentTypingEl.className = 'typing-row';
  agentTypingEl.innerHTML =
    '<div class="msg-av" style="background:#e8f0fe">💬</div>'
    + '<div class="bubble-wrap">'
    + '<div class="agent-typing-label">Agent is typing…</div>'
    + '<div class="typing-bbl"><span></span><span></span><span></span></div>'
    + '</div>';
  msgs.appendChild(agentTypingEl);
  scrollBottom();
}

function hideAgentTyping() {
  if (agentTypingEl) { agentTypingEl.remove(); agentTypingEl = null; }
}

// ── Message renderers ────────────────────────────────────────
function appendBot(text) {
  var row = document.createElement('div');
  row.className = 'msg-row bot';
  row.innerHTML = '<div class="msg-av">🦷</div>'
    + '<div class="bubble-wrap"><div class="bbl">' + escHtml(text) + '</div>'
    + '<div class="msg-time">' + nowStr() + '</div></div>';
  msgs.appendChild(row); scrollBottom();
}

function appendAgent(text, sender) {
  hideAgentTyping();
  var row = document.createElement('div');
  row.className = 'msg-row agent';
  var nameHtml = sender
    ? '<div class="agent-name">' + escHtml(sender) + '</div>'
    : '';
  row.innerHTML = '<div class="msg-av" style="background:#e8f0fe">💬</div>'
    + '<div class="bubble-wrap">' + nameHtml
    + '<div class="bbl">' + escHtml(text) + '</div>'
    + '<div class="msg-time">' + nowStr() + '</div></div>';
  msgs.appendChild(row); scrollBottom();
}

function appendUser(text) {
  var row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = '<div class="msg-av">👤</div>'
    + '<div class="bubble-wrap"><div class="bbl">' + escHtml(text) + '</div>'
    + '<div class="msg-time">' + nowStr() + '</div></div>';
  msgs.appendChild(row); scrollBottom();
}

function appendSysNote(text) {
  var el = document.createElement('div');
  el.className = 'sys-note';
  el.textContent = text;
  msgs.appendChild(el); scrollBottom();
}

function showTyping() {
  var row = document.createElement('div');
  row.className = 'typing-row';
  row.innerHTML = '<div class="msg-av">🦷</div>'
    + '<div class="typing-bbl"><span></span><span></span><span></span></div>';
  msgs.appendChild(row); scrollBottom(); return row;
}

// ── Appointment-style handoff (chat ends, callback requested) ─
function triggerHandoff() {
  handedOff = true;
  var banner = document.createElement('div');
  banner.className = 'handoff-banner';
  banner.innerHTML = '<span class="hb-icon">&#x2705;</span>'
    + '<div><strong>Your message has been sent to our team.</strong><br>'
    + 'A staff member will call you back shortly during office hours (Mon–Fri, 8 AM–5 PM).'
    + ' Need immediate help? Call <strong>(508) 830-1212</strong>.</div>';
  msgs.appendChild(banner);
  var note = document.createElement('div');
  note.className = 'sys-note'; note.textContent = 'Chat ended · Thank you!';
  msgs.appendChild(note);
  inp.disabled = true; sendBtn.disabled = true;
  inp.placeholder = 'This chat has been sent to our team.';
  scrollBottom();
}

// ── Utilities ────────────────────────────────────────────────
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = ''; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function setLoading(on) { sendBtn.disabled = on; inp.disabled = on; }
function nowStr() { return new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); }
function scrollBottom() { setTimeout(function() { msgs.scrollTop = msgs.scrollHeight; }, 30); }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
