<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — Dental Center Pediatrics</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{--blue:#4a90d9;--blue-dk:#3a7bc8;--blue-lt:#eaf3fb;--navy:#1a2e44;--green:#10b981;--green-lt:#d1fae5;--slate:#64748b;--slate-lt:#f1f5f9;--slate-bd:#e2e8f0;--red:#ef4444;--white:#fff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;font-family:'DM Sans',sans-serif;background:transparent;overflow:hidden;}
  #bubble{position:fixed;bottom:18px;right:18px;width:58px;height:58px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 22px rgba(74,144,217,.5);transition:transform .2s,box-shadow .2s;z-index:999;}
  #bubble:hover{transform:scale(1.07);box-shadow:0 6px 30px rgba(74,144,217,.6);}
  #bubble svg{transition:opacity .2s,transform .2s;position:absolute;}
  #bubble .ico-chat{opacity:1;}#bubble .ico-close{opacity:0;transform:rotate(-45deg);}
  #bubble.open .ico-chat{opacity:0;transform:rotate(45deg);}#bubble.open .ico-close{opacity:1;transform:rotate(0);}
  #bubble-badge{position:absolute;top:-2px;right:-2px;width:20px;height:20px;border-radius:50%;background:#ef4444;border:2.5px solid white;display:none;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:white;animation:badgepop .3s ease-out;}
  @keyframes badgepop{from{transform:scale(0)}to{transform:scale(1)}}
  #panel{position:fixed;bottom:88px;right:18px;width:350px;height:520px;background:var(--white);border-radius:18px;box-shadow:0 8px 48px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden;transform:scale(.9) translateY(16px);transform-origin:bottom right;opacity:0;pointer-events:none;transition:opacity .22s cubic-bezier(.4,0,.2,1),transform .22s cubic-bezier(.4,0,.2,1);z-index:998;}
  #panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all;}
  .hdr{background:var(--blue);padding:14px 16px 12px;flex-shrink:0;display:flex;align-items:center;gap:11px;}
  .hdr-av{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .hdr-name{font-size:14px;font-weight:700;color:#fff;}
  .hdr-sub{font-size:11px;color:rgba(255,255,255,.82);margin-top:1px;display:flex;align-items:center;gap:5px;}
  .dot-online{width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block;}
  #msgs{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
  #msgs::-webkit-scrollbar{width:4px;}#msgs::-webkit-scrollbar-thumb{background:var(--slate-bd);border-radius:4px;}
  .msg-row{display:flex;gap:8px;max-width:85%;animation:msgin .18s ease-out;}
  @keyframes msgin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg-row.bot{align-self:flex-start;}.msg-row.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg-av-sm{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:var(--blue-lt);display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:2px;}
  .msg-row.user .msg-av-sm{background:var(--slate-lt);}
  .bubble-wrap{display:flex;flex-direction:column;gap:2px;}
  .bbl{padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.52;word-break:break-word;}
  .bot .bbl{background:var(--slate-lt);color:var(--navy);border-radius:14px 14px 14px 3px;}
  .user .bbl{background:var(--blue);color:#fff;border-radius:14px 14px 3px 14px;}
  .msg-time{font-size:10px;color:#94a3b8;padding:0 4px;}.user .msg-time{text-align:right;}
  .typing-row{display:flex;gap:8px;align-self:flex-start;animation:msgin .18s ease-out;}
  .typing-bbl{background:var(--slate-lt);border-radius:14px 14px 14px 3px;padding:11px 16px;display:flex;gap:5px;align-items:center;}
  .typing-bbl span{width:7px;height:7px;border-radius:50%;background:#94a3b8;animation:bounce 1.2s infinite;}
  .typing-bbl span:nth-child(2){animation-delay:.2s;}.typing-bbl span:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  .handoff-banner{background:var(--green-lt);border:1px solid #6ee7b7;border-radius:10px;padding:10px 13px;font-size:12px;color:#065f46;line-height:1.5;display:flex;gap:9px;align-items:flex-start;animation:msgin .2s ease-out;}
  .hb-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
  .sys-note{text-align:center;font-size:11px;color:#94a3b8;padding:2px 0;font-style:italic;}
  .input-bar{border-top:1px solid var(--slate-bd);padding:10px 12px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:var(--white);}
  #user-input{flex:1;border:1.5px solid var(--slate-bd);border-radius:20px;padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--navy);outline:none;resize:none;max-height:100px;line-height:1.45;transition:border-color .15s;background:var(--white);}
  #user-input:focus{border-color:var(--blue);}#user-input::placeholder{color:#94a3b8;}#user-input:disabled{background:var(--slate-lt);color:var(--slate);}
  #send-btn{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;}
  #send-btn:hover:not(:disabled){background:var(--blue-dk);}#send-btn:active:not(:disabled){transform:scale(.92);}#send-btn:disabled{opacity:.45;cursor:not-allowed;}
  .privacy{font-size:10px;color:#94a3b8;text-align:center;padding:5px 14px 10px;flex-shrink:0;line-height:1.4;}
  @media(max-width:400px){#panel{width:calc(100vw - 24px);right:12px;height:90vh;bottom:80px;}}
</style>
</head>
<body>

<button id="bubble" aria-label="Chat with us">
  <span id="bubble-badge"></span>
  <svg class="ico-chat" width="24" height="24" fill="none" viewBox="0 0 24 24">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <svg class="ico-close" width="22" height="22" fill="none" viewBox="0 0 24 24">
    <path d="M18 6 6 18M6 6l12 12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
</button>

<div id="panel" role="dialog" aria-label="Chat with Dental Center Pediatrics">
  <div class="hdr">
    <div class="hdr-av">🦷</div>
    <div>
      <div class="hdr-name">Dental Center Pediatrics</div>
      <div class="hdr-sub"><span class="dot-online"></span>AI Assistant &middot; replies instantly</div>
    </div>
  </div>
  <div id="msgs"></div>
  <div class="input-bar">
    <textarea id="user-input" rows="1" placeholder="Type your message…" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()" aria-label="Send">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24">
        <path d="M22 2 11 13M22 2 15 22 11 13 2 9l20-7z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="privacy">🔒 Your privacy is protected. No sensitive health data is stored in this chat.</div>
</div>

<script>
// ── CONFIG — change to your server's public URL ────────────────
const INBOX_URL = "http://localhost:5001";
// ──────────────────────────────────────────────────────────────

const bubble  = document.getElementById("bubble");
const panel   = document.getElementById("panel");
const msgs    = document.getElementById("msgs");
const inp     = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const badge   = document.getElementById("bubble-badge");

let history   = [];
let handedOff = false;
let opened    = false;

bubble.addEventListener("click", () => {
  const isOpen = panel.classList.toggle("open");
  bubble.classList.toggle("open", isOpen);
  badge.style.display = "none";
  if (isOpen && !opened) { opened = true; sendGreeting(); }
});

function sendGreeting() {
  appendBot("Hi there! \uD83D\uDC4B I'm the virtual assistant for Dental Center Pediatrics. I can answer questions about our services, hours, and insurance \u2014 or help you request an appointment. What can I help you with today?");
}

setTimeout(() => {
  if (!opened) { badge.textContent = "1"; badge.style.display = "flex"; }
}, 4000);

async function sendMessage() {
  const text = inp.value.trim();
  if (!text || handedOff) return;
  appendUser(text);
  history.push({ role: "user", content: text });
  inp.value = ""; inp.style.height = "";
  setLoading(true);
  const typingEl = showTyping();
  try {
    const res  = await fetch(INBOX_URL + "/webchat/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ messages: history })
    });
    const data = await res.json();
    typingEl.remove(); setLoading(false);
    appendBot(data.reply);
    history.push({ role: "assistant", content: data.reply });
    if (data.handoff) triggerHandoff();
  } catch (e) {
    typingEl.remove(); setLoading(false);
    appendBot("I'm having trouble connecting right now. Please call us at (508) 830-1212 and we'll be happy to help!");
  }
}

function handleKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = ""; el.style.height = Math.min(el.scrollHeight, 100) + "px"; }
function setLoading(on) { sendBtn.disabled = on; inp.disabled = on; }

function nowStr() { return new Date().toLocaleTimeString([], { hour:"numeric", minute:"2-digit" }); }

function appendBot(text) {
  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.innerHTML = '<div class="msg-av-sm">\uD83E\uDDB7</div><div class="bubble-wrap"><div class="bbl">' + escHtml(text) + '</div><div class="msg-time">' + nowStr() + '</div></div>';
  msgs.appendChild(row); scrollBottom();
}
function appendUser(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = '<div class="msg-av-sm">\uD83D\uDC64</div><div class="bubble-wrap"><div class="bbl">' + escHtml(text) + '</div><div class="msg-time">' + nowStr() + '</div></div>';
  msgs.appendChild(row); scrollBottom();
}
function showTyping() {
  const row = document.createElement("div");
  row.className = "typing-row";
  row.innerHTML = '<div class="msg-av-sm">\uD83E\uDDB7</div><div class="typing-bbl"><span></span><span></span><span></span></div>';
  msgs.appendChild(row); scrollBottom(); return row;
}
function triggerHandoff() {
  handedOff = true;
  const banner = document.createElement("div");
  banner.className = "handoff-banner";
  banner.innerHTML = '<span class="hb-icon">\u2705</span><div><strong>Your message has been sent to our team.</strong><br>A staff member will call you back shortly during office hours (Mon\u2013Fri, 8 AM\u20135 PM). Need immediate help? Call <strong>(508) 830-1212</strong>.</div>';
  msgs.appendChild(banner);
  const note = document.createElement("div");
  note.className = "sys-note"; note.textContent = "Chat ended \u00B7 Thank you!";
  msgs.appendChild(note);
  inp.disabled = true; sendBtn.disabled = true;
  inp.placeholder = "This chat has been sent to our team.";
  scrollBottom();
}
function scrollBottom() { setTimeout(() => { msgs.scrollTop = msgs.scrollHeight; }, 30); }
function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>"); }
</script>
</body>
</html>
