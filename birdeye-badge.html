<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews Badge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 230px;
      height: 100px;
      overflow: hidden;
      background: transparent;
    }
    a.badge {
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 230px;
      height: 100px;
      background: linear-gradient(135deg, #0E67B4 0%, #0A4F8F 100%);
      color: #fff;
      text-decoration: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      padding: 10px 16px;
      cursor: pointer;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }
    .brand {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 6px;
    }
    .middle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }
    .rating-num {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }
    .stars {
      font-size: 17px;
      color: #FFD43B;
      letter-spacing: 1px;
      line-height: 1;
    }
    .count {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <a class="badge"
     href="https://secureform.dentalcenterpediatrics.com/birdeye-reviews.html"
     target="_blank"
     rel="noopener noreferrer">
    <div class="brand">BirdEye</div>
    <div class="middle-row">
      <span class="rating-num" id="rating">4.9</span>
      <div>
        <div class="stars" id="stars">★★★★★</div>
        <div class="count" id="count">Loading reviews…</div>
      </div>
    </div>
  </a>

  <script>
    fetch('reviews.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var avg   = parseFloat(data.business.avgRating);
        var count = parseInt(data.business.reviewCount, 10);
        document.getElementById('rating').textContent = avg.toFixed(1);
        document.getElementById('count').textContent  =
          count.toLocaleString() + ' Reviews';
        var full  = Math.round(avg);
        document.getElementById('stars').textContent  =
          '★'.repeat(full) + '☆'.repeat(5 - full);
      })
      .catch(function() {
        document.getElementById('count').textContent = 'View All Reviews';
      });
  </script>
</body>
</html>
